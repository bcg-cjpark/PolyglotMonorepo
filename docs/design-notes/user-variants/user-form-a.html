<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>시안 — UserFormPage Variant A (세로 스택 1열)</title>
<!--
  시안: User Form — Variant A (세로 스택 1열, 권장)
  용도: 시각 근사 (실제 @monorepo/ui primitive 는 구현 단계에서 사용)
  원본 PRD: docs/prd/user.md
  원본 Brief: docs/stitch-brief/user.md
-->
<style>
:root[data-theme="light"],
:root {
  --base-colors-primary-primary800: #4f46e5;
  --base-colors-primary-primary900: #3a30e2;
  --base-colors-primary-primary100: #dedcf9;
  --base-colors-primary-primary050: #eeeefc;
  --base-colors-primary-primary-deep: #251bc3;
  --base-colors-secondary-secondary100: #fcefd9;
  --base-colors-secondary-secondary-deep: #ac6f07;
  --base-colors-neutral-neutral800: #131313;
  --base-colors-neutral-neutral750: #242424;
  --base-colors-neutral-neutral700: #333740;
  --base-colors-neutral-neutral600: #5a5c5e;
  --base-colors-neutral-neutral550: #717375;
  --base-colors-neutral-neutral500: #8f9299;
  --base-colors-neutral-neutral400: #b4b6bb;
  --base-colors-neutral-neutral300: #caccce;
  --base-colors-neutral-neutral250: #dadbdd;
  --base-colors-neutral-neutral200: #ecedee;
  --base-colors-neutral-neutral150: #ecedee;
  --base-colors-neutral-neutral100: #f5f6f6;
  --base-colors-neutral-neutral050: #f1f3f5;
  --base-colors-neutral-neutral000: #ffffff;
  --base-colors-red-red900: #ed2d32;
  --base-colors-red-red050: #fff1f2;
  --base-colors-common-bg-surface-default: var(--base-colors-neutral-neutral000);
  --base-colors-common-light-gray-f5: #f5f7f9;
  --base-colors-common-light-gray-ea: #eaecee;

  --base-size-size-4: 0.25rem;
  --base-size-size-6: 0.375rem;
  --base-size-size-8: 0.5rem;
  --base-size-size-10: 0.625rem;
  --base-size-size-12: 0.75rem;
  --base-size-size-16: 1rem;
  --base-size-size-20: 1.25rem;
  --base-size-size-24: 1.5rem;
  --base-size-size-36: 2.25rem;
  --base-size-size-40: 2.5rem;
  --base-size-size-48: 3rem;

  --button-primary-background: var(--base-colors-primary-primary800);
  --button-primary-text: #ffffff;
  --button-primary-border: var(--base-colors-primary-primary800);
  --button-primary-background-hover: var(--base-colors-primary-primary900);
  --button-outline-text: var(--base-colors-neutral-neutral750);
  --button-outline-border: var(--base-colors-neutral-neutral550);
  --button-outline-background: var(--base-colors-common-bg-surface-default);
  --button-outline-background-hover: #f7f7f7;

  --font-color-default: var(--base-colors-neutral-neutral800);
  --font-color-default-muted: var(--base-colors-neutral-neutral500);
  --font-color-default-muted-dark: var(--base-colors-neutral-neutral550);
  --font-color-red: var(--base-colors-red-red900);
  --font-color-white: var(--base-colors-neutral-neutral000);

  --input-color-surface: var(--base-colors-neutral-neutral000);
  --input-color-border-static: var(--base-colors-neutral-neutral250);
  --input-color-border-focus: var(--base-colors-primary-primary800);
  --input-color-border-error: var(--base-colors-red-red900);
  --input-color-text-placeholder: var(--base-colors-neutral-neutral400);
  --input-color-text-static: var(--base-colors-neutral-neutral800);
  --input-color-text-error: var(--base-colors-red-red900);

  --background-bg-default: var(--base-colors-neutral-neutral000);
  --background-bg-surface: var(--base-colors-common-light-gray-ea);
  --background-bg-innerframe: var(--base-colors-common-light-gray-f5);
  --background-divider: var(--base-colors-neutral-neutral250);

  --padding-padding-4: var(--base-size-size-4);
  --padding-padding-8: var(--base-size-size-8);
  --padding-padding-12: var(--base-size-size-12);
  --padding-padding-16: var(--base-size-size-16);
  --padding-padding-24: var(--base-size-size-24);
  --padding-padding-36: var(--base-size-size-36);

  --radius-xs: var(--base-size-size-4);
  --radius-sm: var(--base-size-size-6);
  --radius-default: var(--base-size-size-8);

  --alert-warning-icon-color: var(--base-colors-secondary-secondary-deep);
}

* { box-sizing: border-box; }

body {
  font-family: 'Pretendard', 'Pretendard Variable', system-ui, -apple-system, sans-serif;
  background-color: var(--background-bg-default);
  color: var(--font-color-default);
  margin: 0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.page-container {
  max-width: 32rem;
  margin: 0 auto;
  padding: var(--padding-padding-24);
  display: flex;
  flex-direction: column;
  gap: var(--padding-padding-24);
}

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--padding-padding-16);
}
.page-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.02em;
}

.form-stack {
  display: flex;
  flex-direction: column;
  gap: var(--padding-padding-24);
  padding: var(--padding-padding-24);
  background-color: var(--background-bg-default);
  border: 1px solid var(--background-divider);
  border-radius: var(--radius-default);
}

/* Input primitive 흉내: label + input + helper */
.form-field {
  display: flex;
  flex-direction: column;
  gap: var(--padding-padding-8);
}
.form-field__label {
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--font-color-default);
}
.form-field__label .required-mark {
  color: var(--font-color-red);
  margin-left: 2px;
}
.form-field__input {
  width: 100%;
  height: 2.5rem;
  padding: 0 var(--padding-padding-12);
  background-color: var(--input-color-surface);
  border: 1px solid var(--input-color-border-static);
  border-radius: var(--radius-default);
  color: var(--input-color-text-static);
  font-size: 0.9375rem;
  font-family: inherit;
  transition: border-color 0.12s ease, box-shadow 0.12s ease;
}
.form-field__input::placeholder {
  color: var(--input-color-text-placeholder);
}
.form-field__input:focus {
  outline: none;
  border-color: var(--input-color-border-focus);
  box-shadow: 0 0 0 3px var(--base-colors-primary-primary100);
}
.form-field--error .form-field__input {
  border-color: var(--input-color-border-error);
}
.form-field--error .form-field__input:focus {
  box-shadow: 0 0 0 3px var(--base-colors-red-red050);
}
.form-field__helper {
  font-size: 0.75rem;
  color: var(--font-color-default-muted);
  line-height: 1.4;
}
.form-field--error .form-field__helper {
  color: var(--input-color-text-error);
}

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--padding-padding-8);
  padding-top: var(--padding-padding-8);
  border-top: 1px solid var(--background-divider);
  margin-top: var(--padding-padding-8);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--padding-padding-4);
  padding: var(--padding-padding-8) var(--padding-padding-16);
  border-radius: var(--radius-default);
  font-size: 0.875rem;
  font-weight: 600;
  line-height: 1;
  border: 1px solid transparent;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  height: 2.5rem;
}
.btn-primary {
  background-color: var(--button-primary-background);
  color: var(--button-primary-text);
  border-color: var(--button-primary-border);
}
.btn-primary:hover { background-color: var(--button-primary-background-hover); }
.btn-ghost {
  background-color: var(--button-outline-background);
  color: var(--button-outline-text);
  border-color: var(--button-outline-border);
}
.btn-ghost:hover { background-color: var(--button-outline-background-hover); }
</style>
</head>
<body>
  <div class="page-container">

    <header class="page-header" role="banner">
      <h1 class="page-title">새 사용자</h1>
      <a class="btn btn-ghost" href="#" aria-label="목록으로 돌아가기">취소</a>
    </header>

    <!--
      본문: 세로 스택 1열 폼 (Input primitive 2개 + 폼 하단 액션 바).
      - email: 이메일 형식 위반 시 에러 텍스트 (예시로 필드 하단 메시지만 렌더).
      - name : 공백만 금지. 한글 IME 입력 필드.
      상태 전환 (구현 단계):
        - 저장 중   : Primary Button 에 disabled + 스피너 상태.
        - 성공     : 목록 페이지로 라우팅.
        - 409 중복 : email 필드가 error 상태로 전환 + "이미 사용 중인 이메일입니다" helper.
    -->
    <form class="form-stack" novalidate>

      <!-- email: 정상 상태 예시 -->
      <div class="form-field">
        <label class="form-field__label" for="field-email">
          이메일<span class="required-mark" aria-hidden="true">*</span>
        </label>
        <input
          id="field-email"
          class="form-field__input"
          type="email"
          name="email"
          placeholder="name@company.com"
          value="minjun.kim@example.com"
          autocomplete="email"
        />
        <span class="form-field__helper">
          로그인 ID 및 시스템 식별자로 사용됩니다.
        </span>
      </div>

      <!-- name: 한글 IME 입력 전제, 정상 상태 예시 -->
      <div class="form-field">
        <label class="form-field__label" for="field-name">
          이름<span class="required-mark" aria-hidden="true">*</span>
        </label>
        <input
          id="field-name"
          class="form-field__input"
          type="text"
          name="name"
          placeholder="예: 김민준"
          value="김민준"
          autocomplete="name"
        />
        <span class="form-field__helper">
          공백만 입력할 수 없습니다. (최대 100자)
        </span>
      </div>

      <!-- 참고: 에러 상태 시각 예시 (실제 렌더는 조건부). 가이드 차원에서 주석 처리.
      <div class="form-field form-field--error">
        <label class="form-field__label" for="field-email-err">
          이메일<span class="required-mark" aria-hidden="true">*</span>
        </label>
        <input id="field-email-err" class="form-field__input" type="email" value="not-an-email" />
        <span class="form-field__helper">이메일 형식이 올바르지 않습니다.</span>
      </div>
      -->

      <div class="form-actions">
        <a class="btn btn-ghost" href="#" type="button">취소</a>
        <button class="btn btn-primary" type="submit">저장</button>
      </div>
    </form>
  </div>
</body>
</html>
