<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<title>User 화면 시안 비교 — index</title>
<!--
  User 피처 화면 시안 비교 인덱스. 각 cell 은 독립 HTML 의 iframe 렌더.
  원본 PRD: ../../prd/user.md
  원본 Brief: ../../stitch-brief/user.md
  카탈로그: ../user-variants.md

  외부 리소스 0 — 모든 토큰/스타일/스크립트 인라인.
  전역 Light/Dark 토글은 iframe src 에 ?theme=light|dark 쿼리를 붙여
  file:// same-origin 차단을 회피하고 모든 cell 을 동기 스위칭한다.
-->
<style>
:root[data-theme="light"] {
  --base-colors-neutral-neutral800: #131313;
  --base-colors-neutral-neutral700: #333740;
  --base-colors-neutral-neutral500: #8f9299;
  --base-colors-neutral-neutral250: #dadbdd;
  --base-colors-neutral-neutral200: #ecedee;
  --base-colors-neutral-neutral100: #f5f6f6;
  --base-colors-neutral-neutral050: #f1f3f5;
  --base-colors-neutral-neutral000: #ffffff;
  --base-colors-common-light-gray-f5: #f5f7f9;
  --base-colors-common-light-gray-ea: #eaecee;
  --base-colors-primary-primary800: #4f46e5;
  --base-colors-primary-primary900: #3a30e2;

  --background-bg-default: var(--base-colors-neutral-neutral000);
  --background-bg-surface: var(--base-colors-common-light-gray-ea);
  --background-bg-innerframe: var(--base-colors-common-light-gray-f5);
  --background-divider: var(--base-colors-neutral-neutral250);

  --font-color-default: var(--base-colors-neutral-neutral800);
  --font-color-default-muted: var(--base-colors-neutral-neutral500);

  --button-primary-background: var(--base-colors-primary-primary800);
  --button-primary-text: #ffffff;
  --button-primary-border: var(--base-colors-primary-primary800);
  --button-primary-background-hover: var(--base-colors-primary-primary900);

  --font-size-font-14: 0.875rem;
  --font-size-font-16: 1rem;
  --font-size-font-20: 1.25rem;
  --font-weights-regular: 400;
  --font-weights-semibold: 600;
  --font-weights-bold: 700;

  --padding-padding-4: 0.25rem;
  --padding-padding-8: 0.5rem;
  --padding-padding-12: 0.75rem;
  --padding-padding-16: 1rem;
  --padding-padding-24: 1.5rem;

  --radius-sm: 0.375rem;
  --radius-default: 0.5rem;
}

:root[data-theme="dark"] {
  --base-colors-neutral-neutral800: #ffffff;
  --base-colors-neutral-neutral700: #ecedee;
  --base-colors-neutral-neutral500: #babcbe;
  --base-colors-neutral-neutral250: #5a5c5e;
  --base-colors-neutral-neutral200: #313335;
  --base-colors-neutral-neutral100: #1a1c1e;
  --base-colors-neutral-neutral050: #151719;
  --base-colors-neutral-neutral000: #131313;
  --base-colors-common-light-gray-f5: var(--base-colors-neutral-neutral050);
  --base-colors-common-light-gray-ea: var(--base-colors-neutral-neutral100);
  --base-colors-primary-primary800: #4f46e5;
  --base-colors-primary-primary900: #3a30e2;

  --background-bg-default: #212325;
  --background-bg-surface: var(--base-colors-neutral-neutral100);
  --background-bg-innerframe: var(--base-colors-neutral-neutral050);
  --background-divider: var(--base-colors-neutral-neutral200);

  --font-color-default: var(--base-colors-neutral-neutral700);
  --font-color-default-muted: var(--base-colors-neutral-neutral500);

  --button-primary-background: var(--base-colors-primary-primary800);
  --button-primary-text: #ffffff;
  --button-primary-border: var(--base-colors-primary-primary800);
  --button-primary-background-hover: var(--base-colors-primary-primary900);

  --font-size-font-14: 0.875rem;
  --font-size-font-16: 1rem;
  --font-size-font-20: 1.25rem;
  --font-weights-regular: 400;
  --font-weights-semibold: 600;
  --font-weights-bold: 700;

  --padding-padding-4: 0.25rem;
  --padding-padding-8: 0.5rem;
  --padding-padding-12: 0.75rem;
  --padding-padding-16: 1rem;
  --padding-padding-24: 1.5rem;

  --radius-sm: 0.375rem;
  --radius-default: 0.5rem;
}

* { box-sizing: border-box; }

body {
  font-family: 'Pretendard', 'Pretendard Variable', system-ui, -apple-system, sans-serif;
  background-color: var(--background-bg-surface);
  color: var(--font-color-default);
  margin: 0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.15s ease, color 0.15s ease;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background-color: var(--background-bg-default);
  border-bottom: 1px solid var(--background-divider);
  padding: var(--padding-padding-16) var(--padding-padding-24);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--padding-padding-16);
}
.top-title {
  margin: 0;
  font-size: var(--font-size-font-20);
  font-weight: var(--font-weights-bold);
  letter-spacing: -0.02em;
}
.top-subtitle {
  font-size: var(--font-size-font-14);
  color: var(--font-color-default-muted);
  margin-top: 2px;
}
.top-actions {
  display: flex;
  align-items: center;
  gap: var(--padding-padding-12);
}
.toggle-btn {
  background-color: var(--button-primary-background);
  color: var(--button-primary-text);
  border: 1px solid var(--button-primary-border);
  border-radius: var(--radius-default);
  padding: var(--padding-padding-8) var(--padding-padding-16);
  font-size: var(--font-size-font-14);
  font-weight: var(--font-weights-semibold);
  font-family: inherit;
  cursor: pointer;
  transition: background-color 0.12s ease;
}
.toggle-btn:hover {
  background-color: var(--button-primary-background-hover);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--padding-padding-24);
  padding: var(--padding-padding-24);
}
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

figure.variant-cell {
  margin: 0;
  background-color: var(--background-bg-default);
  border: 1px solid var(--background-divider);
  border-radius: var(--radius-default);
  padding: var(--padding-padding-16);
  display: flex;
  flex-direction: column;
  gap: var(--padding-padding-12);
}
figcaption {
  font-size: var(--font-size-font-14);
  font-weight: var(--font-weights-semibold);
  color: var(--font-color-default);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
figcaption .variant-intent {
  font-size: 0.8125rem;
  font-weight: var(--font-weights-regular);
  color: var(--font-color-default-muted);
}
iframe {
  width: 100%;
  height: 720px;
  border: 1px solid var(--background-divider);
  border-radius: var(--radius-default);
  background-color: var(--background-bg-default);
}

.footer-note {
  padding: var(--padding-padding-16) var(--padding-padding-24) var(--padding-padding-24);
  color: var(--font-color-default-muted);
  font-size: 0.8125rem;
  line-height: 1.5;
}
.footer-note a {
  color: var(--button-primary-background);
  text-decoration: none;
}
.footer-note a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

  <header class="top-bar" role="banner">
    <div>
      <h1 class="top-title">User 화면 시안 비교</h1>
      <div class="top-subtitle">UserListPage / UserFormPage 각 Variant A/B/C — 6종 한 페이지 비교</div>
    </div>
    <div class="top-actions">
      <button class="toggle-btn" type="button" onclick="toggleAll()" aria-label="전역 Light/Dark 테마 전환">🌓 전역 Light ↔ Dark</button>
    </div>
  </header>

  <main class="grid">

    <figure class="variant-cell">
      <figcaption>
        UserListPage / Variant A — 표 중심 (권장)
        <span class="variant-intent">data-display.md §3 매트릭스 정직 반영. Table primitive + Primary CTA.</span>
      </figcaption>
      <iframe src="user-list-a.html?theme=light" loading="lazy" title="UserListPage Variant A"></iframe>
    </figure>

    <figure class="variant-cell">
      <figcaption>
        UserListPage / Variant B — 카드 리스트 (대안)
        <span class="variant-intent">List + 합성 UserCard. 시각 풍부도 ↑, PRD "표" 카테고리와 충돌.</span>
      </figcaption>
      <iframe src="user-list-b.html?theme=light" loading="lazy" title="UserListPage Variant B"></iframe>
    </figure>

    <figure class="variant-cell">
      <figcaption>
        UserListPage / Variant C — 표 + 요약 Badge
        <span class="variant-intent">A + 상단 Badge strip (전체/이번 주/도메인). 집계 지표 스펙 부재.</span>
      </figcaption>
      <iframe src="user-list-c.html?theme=light" loading="lazy" title="UserListPage Variant C"></iframe>
    </figure>

    <figure class="variant-cell">
      <figcaption>
        UserFormPage / Variant A — 세로 스택 1열 (권장)
        <span class="variant-intent">Brief "세로 스택" 정직 반영. Input 2개 + Primary "저장" + Ghost "취소".</span>
      </figcaption>
      <iframe src="user-form-a.html?theme=light" loading="lazy" title="UserFormPage Variant A"></iframe>
    </figure>

    <figure class="variant-cell">
      <figcaption>
        UserFormPage / Variant B — 2열 그리드
        <span class="variant-intent">email/name 을 가로 2열로. 수직 공간 ↓, Brief 이탈.</span>
      </figcaption>
      <iframe src="user-form-b.html?theme=light" loading="lazy" title="UserFormPage Variant B"></iframe>
    </figure>

    <figure class="variant-cell">
      <figcaption>
        UserFormPage / Variant C — 모달형 (오버레이)
        <span class="variant-intent">Modal primitive 로 /users 위 즉시 생성. Route 충돌, PRD 개정 필요.</span>
      </figcaption>
      <iframe src="user-form-c.html?theme=light" loading="lazy" title="UserFormPage Variant C"></iframe>
    </figure>

  </main>

  <p class="footer-note">
    각 iframe 은 독립 HTML. 개별 파일은 자체 🌓 토글을 가지며, 상단 "전역 Light ↔ Dark" 는
    iframe src 의 <code>?theme=</code> 쿼리를 재작성해 모두 동기 스위칭함 (file:// same-origin 회피).
    카탈로그: <a href="../user-variants.md">../user-variants.md</a>
  </p>

  <script>
    var currentTheme = 'light';
    document.documentElement.dataset.theme = currentTheme;
    function toggleAll() {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = currentTheme;
      document.querySelectorAll('iframe').forEach(function (f) {
        var base = f.src.split('?')[0];
        f.src = base + '?theme=' + currentTheme;
      });
    }
  </script>
</body>
</html>
