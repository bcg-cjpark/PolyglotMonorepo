<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<title>TodoListPage 비교 — Variant A/B/C</title>
<!--
  Level 2: TodoListPage 의 3 variant 동시 비교. iframe 의 테마는 ?theme= 쿼리로 전달.
  원본 PRD: ../../prd/todo.md
  원본 Brief: ../../stitch-brief/todo.md
  상위: index.html (Level 1)
  하위: todo-list-a.html / todo-list-b.html / todo-list-c.html (Level 3)

  외부 리소스 0 — 모든 토큰/스타일/스크립트 인라인.
  전역 Light/Dark 토글은 iframe src + a.open-full href 둘 다 ?theme= 쿼리를 재작성해 동기화.
-->
<style>
:root[data-theme="light"] {
  --base-colors-neutral-neutral800: #131313;
  --base-colors-neutral-neutral500: #8f9299;
  --base-colors-neutral-neutral250: #dadbdd;
  --base-colors-neutral-neutral000: #ffffff;
  --base-colors-common-light-gray-f5: #f5f7f9;
  --base-colors-common-light-gray-ea: #eaecee;
  --base-colors-primary-primary800: #4f46e5;
  --base-colors-primary-primary900: #3a30e2;

  --background-bg-default: var(--base-colors-neutral-neutral000);
  --background-bg-surface: var(--base-colors-common-light-gray-ea);
  --background-bg-innerframe: var(--base-colors-common-light-gray-f5);
  --background-divider: var(--base-colors-neutral-neutral250);

  --font-color-default: var(--base-colors-neutral-neutral800);
  --font-color-default-muted: var(--base-colors-neutral-neutral500);

  --button-primary-background: var(--base-colors-primary-primary800);
  --button-primary-text: #ffffff;
  --button-primary-border: var(--base-colors-primary-primary800);
  --button-primary-background-hover: var(--base-colors-primary-primary900);

  --font-size-font-14: 0.875rem;
  --font-size-font-16: 1rem;
  --font-size-font-20: 1.25rem;
  --font-size-font-24: 1.5rem;
  --font-weights-regular: 400;
  --font-weights-semibold: 600;
  --font-weights-bold: 700;

  --padding-padding-4: 0.25rem;
  --padding-padding-8: 0.5rem;
  --padding-padding-12: 0.75rem;
  --padding-padding-16: 1rem;
  --padding-padding-24: 1.5rem;
  --padding-padding-32: 2rem;
}

:root[data-theme="dark"] {
  --base-colors-neutral-neutral800: #ffffff;
  --base-colors-neutral-neutral500: #babcbe;
  --base-colors-neutral-neutral250: #5a5c5e;
  --base-colors-neutral-neutral200: #313335;
  --base-colors-neutral-neutral100: #1a1c1e;
  --base-colors-neutral-neutral050: #151719;
  --base-colors-neutral-neutral000: #131313;
  --base-colors-common-light-gray-f5: var(--base-colors-neutral-neutral050);
  --base-colors-common-light-gray-ea: var(--base-colors-neutral-neutral100);
  --base-colors-primary-primary800: #4f46e5;
  --base-colors-primary-primary900: #3a30e2;

  --background-bg-default: #212325;
  --background-bg-surface: var(--base-colors-neutral-neutral100);
  --background-bg-innerframe: var(--base-colors-neutral-neutral050);
  --background-divider: var(--base-colors-neutral-neutral200);

  --font-color-default: #ecedee;
  --font-color-default-muted: var(--base-colors-neutral-neutral500);

  --button-primary-background: var(--base-colors-primary-primary800);
  --button-primary-text: #ffffff;
  --button-primary-border: var(--base-colors-primary-primary800);
  --button-primary-background-hover: var(--base-colors-primary-primary900);

  --font-size-font-14: 0.875rem;
  --font-size-font-16: 1rem;
  --font-size-font-20: 1.25rem;
  --font-size-font-24: 1.5rem;
  --font-weights-regular: 400;
  --font-weights-semibold: 600;
  --font-weights-bold: 700;

  --padding-padding-4: 0.25rem;
  --padding-padding-8: 0.5rem;
  --padding-padding-12: 0.75rem;
  --padding-padding-16: 1rem;
  --padding-padding-24: 1.5rem;
  --padding-padding-32: 2rem;
}

* { box-sizing: border-box; }

body {
  font-family: 'Pretendard', 'Pretendard Variable', system-ui, -apple-system, sans-serif;
  background-color: var(--background-bg-surface);
  color: var(--font-color-default);
  margin: 0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.15s ease, color 0.15s ease;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background-color: var(--background-bg-default);
  border-bottom: 1px solid var(--background-divider);
  padding: var(--padding-padding-12) var(--padding-padding-24);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--padding-padding-16);
}
.top-left {
  display: flex;
  align-items: center;
  gap: var(--padding-padding-12);
  min-width: 0;
}
.back-link {
  color: var(--font-color-default-muted);
  text-decoration: none;
  font-size: var(--font-size-font-14);
  font-weight: var(--font-weights-semibold);
  padding: var(--padding-padding-4) var(--padding-padding-8);
  border-radius: 0.375rem;
  transition: background-color 0.12s ease, color 0.12s ease;
}
.back-link:hover {
  background-color: var(--background-bg-innerframe);
  color: var(--font-color-default);
}
.top-divider {
  color: var(--font-color-default-muted);
  font-size: var(--font-size-font-14);
}
.top-title {
  margin: 0;
  font-size: var(--font-size-font-20);
  font-weight: var(--font-weights-bold);
  letter-spacing: -0.02em;
}
.theme-toggle {
  background-color: var(--button-primary-background);
  color: var(--button-primary-text);
  border: 1px solid var(--button-primary-border);
  border-radius: 0.5rem;
  padding: var(--padding-padding-8) var(--padding-padding-16);
  font-size: var(--font-size-font-14);
  font-weight: var(--font-weights-semibold);
  font-family: inherit;
  cursor: pointer;
  transition: background-color 0.12s ease;
}
.theme-toggle:hover {
  background-color: var(--button-primary-background-hover);
}

main.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--padding-padding-16);
  padding: var(--padding-padding-16);
}
@media (max-width: 1100px) {
  main.grid { grid-template-columns: 1fr; }
}

figure.variant-cell {
  margin: 0;
  background-color: var(--background-bg-default);
  border: 1px solid var(--background-divider);
  border-radius: 8px;
  padding: var(--padding-padding-12);
  display: flex;
  flex-direction: column;
  gap: var(--padding-padding-8);
}
figcaption {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--padding-padding-8);
  flex-wrap: wrap;
}
.variant-label {
  font-size: var(--font-size-font-14);
  color: var(--font-color-default);
  font-weight: var(--font-weights-regular);
}
.variant-label strong {
  font-weight: var(--font-weights-bold);
  letter-spacing: -0.01em;
  margin-right: 2px;
}
a.open-full {
  color: var(--button-primary-background);
  text-decoration: none;
  font-size: var(--font-size-font-14);
  font-weight: var(--font-weights-semibold);
}
a.open-full:hover {
  text-decoration: underline;
}
iframe {
  width: 100%;
  height: 720px;
  border: 1px solid var(--background-divider);
  border-radius: 8px;
  background-color: var(--background-bg-default);
}
</style>
</head>
<body>

  <header class="top-bar" role="banner">
    <div class="top-left">
      <a class="back-link" href="index.html">← 비교군 목록</a>
      <span class="top-divider">·</span>
      <h1 class="top-title"><strong>TodoListPage</strong> 비교</h1>
    </div>
    <button class="theme-toggle" type="button" onclick="toggleAll()" aria-label="전역 Light/Dark 테마 전환">🌓 Light ↔ Dark</button>
  </header>

  <main class="grid">

    <figure class="variant-cell">
      <figcaption>
        <div class="variant-label">
          <strong>Variant A</strong> — 표 + 세그먼트 필터 (권장)
        </div>
        <a class="open-full" target="_top" href="todo-list-a.html">전체 화면으로 보기 →</a>
      </figcaption>
      <iframe src="todo-list-a.html" loading="lazy" title="TodoListPage Variant A"></iframe>
    </figure>

    <figure class="variant-cell">
      <figcaption>
        <div class="variant-label">
          <strong>Variant B</strong> — 칸반 2-column
        </div>
        <a class="open-full" target="_top" href="todo-list-b.html">전체 화면으로 보기 →</a>
      </figcaption>
      <iframe src="todo-list-b.html" loading="lazy" title="TodoListPage Variant B"></iframe>
    </figure>

    <figure class="variant-cell">
      <figcaption>
        <div class="variant-label">
          <strong>Variant C</strong> — 컴팩트 List
        </div>
        <a class="open-full" target="_top" href="todo-list-c.html">전체 화면으로 보기 →</a>
      </figcaption>
      <iframe src="todo-list-c.html" loading="lazy" title="TodoListPage Variant C"></iframe>
    </figure>

  </main>

  <script>
    var currentTheme = 'light';
    (function initTheme() {
      var q = new URL(location.href).searchParams.get('theme');
      if (q === 'dark' || q === 'light') currentTheme = q;
      document.documentElement.dataset.theme = currentTheme;
      document.querySelectorAll('iframe').forEach(function (f) {
        var base = f.getAttribute('src').split('?')[0];
        f.src = base + '?theme=' + currentTheme;
      });
      document.querySelectorAll('a.open-full').forEach(function (a) {
        var base = a.getAttribute('href').split('?')[0];
        a.href = base + '?theme=' + currentTheme;
      });
      var back = document.querySelector('a.back-link');
      if (back) {
        var baseBack = back.getAttribute('href').split('?')[0];
        back.href = baseBack + '?theme=' + currentTheme;
      }
    })();
    function toggleAll() {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = currentTheme;
      document.querySelectorAll('iframe').forEach(function (f) {
        var base = f.src.split('?')[0];
        f.src = base + '?theme=' + currentTheme;
      });
      document.querySelectorAll('a.open-full').forEach(function (a) {
        var base = a.href.split('?')[0];
        a.href = base + '?theme=' + currentTheme;
      });
      var back = document.querySelector('a.back-link');
      if (back) {
        var baseBack = back.href.split('?')[0];
        back.href = baseBack + '?theme=' + currentTheme;
      }
    }
  </script>
</body>
</html>
