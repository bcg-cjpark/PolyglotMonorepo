<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<title>시안 — TodoListPage Variant A (표 + 세그먼트 필터)</title>
<!--
  시안: Todo List — Variant A (표 중심, 권장)
  용도: 시각 근사 (실제 @monorepo/ui primitive 는 구현 단계에서 사용)
  원본 PRD:   docs/prd/todo.md
  원본 Brief: docs/stitch-brief/todo.md

  규약 (screen-concepter.md §HTML 작성 규칙):
  - Self-contained, 외부 네트워크 리소스 0.
  - Light/Dark 토큰 서브셋 양쪽 인라인 + 우상단 🌓 토글 + ?theme= 쿼리 초기화.
  - primitive 의 rendered HTML 구조를 흉내 (실제 React 렌더 아님).

  이 variant 의 포인트:
  - 상태 필터: 세그먼트 컨트롤 (3개 옵션: 전체 / 진행 중 / 완료) — 드롭다운 금지 원칙.
  - 체크박스 컬럼 + 제목 + 마감일 + 상태 배지 + 액션(편집/삭제) 5열.
  - completed=true   -> 제목 취소선 + font-color-default-muted.
  - overdue (dueDate<today && !completed) -> 마감일 텍스트만 font-color-red 로 구분.
-->

  --base-colors-primary-primary700: #2d22e0;
  --base-colors-primary-primary200: #1c194d;

  --button-red-text: #ff595c;
  --button-red-border: #ff595c;

  --button-outline-border: var(--base-colors-neutral-neutral200);
  --button-outline-background: var(--base-colors-neutral-neutral100);
  --button-outline-background-hover: var(--base-colors-neutral-neutral100);

  --font-color-default: var(--base-colors-neutral-neutral700);
  --font-color-default-muted: var(--base-colors-neutral-neutral500);
  --font-color-default-muted-dark: var(--base-colors-neutral-neutral500);

  --background-bg-surface: var(--base-colors-neutral-neutral100);

/* ========================================================================
   시안용 레이아웃 (primitive 시각 흉내)
   ======================================================================== */
* { box-sizing: border-box; }

body {
  font-family: 'Pretendard', 'Pretendard Variable', system-ui, -apple-system, sans-serif;
  background-color: var(--background-bg-default);
  color: var(--font-color-default);
  margin: 0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.15s ease, color 0.15s ease;
}

.theme-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 9999;
  background-color: var(--background-bg-default);
  color: var(--font-color-default);
  border: 1px solid var(--background-divider);
  border-radius: var(--radius-default);
  padding: var(--padding-padding-8) var(--padding-padding-12);
  font-size: 0.8125rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background-color 0.12s ease, border-color 0.12s ease;
}
.theme-toggle:hover { background-color: var(--background-bg-innerframe); }

.page-container {
  max-width: 56rem;
  margin: 0 auto;
  padding: var(--padding-padding-24);
  display: flex;
  flex-direction: column;
  gap: var(--padding-padding-24);
}

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--padding-padding-16);
}
.page-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.02em;
}

/* 버튼 시각 흉내 (Button primitive) */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--padding-padding-4);
  padding: var(--padding-padding-8) var(--padding-padding-16);
  border-radius: var(--radius-default);
  font-size: 0.875rem;
  font-weight: 600;
  line-height: 1;
  border: 1px solid transparent;
  cursor: pointer;
  text-decoration: none;
  font-family: inherit;
  transition: background-color 0.12s ease, border-color 0.12s ease;
}
.btn-primary {
  background-color: var(--button-primary-background);
  color: var(--button-primary-text);
  border-color: var(--button-primary-border);
}
.btn-primary:hover { background-color: var(--button-primary-background-hover); }
.btn-ghost {
  background-color: var(--button-outline-background);
  color: var(--button-outline-text);
  border-color: var(--button-outline-border);
}
.btn-ghost:hover { background-color: var(--button-outline-background-hover); }
.btn-destructive {
  background-color: var(--button-red-background);
  color: var(--button-red-text);
  border-color: var(--button-red-border);
}
.btn-destructive:hover { filter: brightness(0.97); }
.btn-sm {
  padding: var(--padding-padding-4) var(--padding-padding-12);
  font-size: 0.8125rem;
}

/* 세그먼트 컨트롤 — RadioGroup (segmented variant) 흉내
   Brief 제약: 드롭다운 금지 (옵션 3개라 오버). 현재 선택은 Primary anchor. */
.segmented {
  display: inline-flex;
  align-items: center;
  gap: var(--padding-padding-4);
  padding: var(--padding-padding-4);
  background-color: var(--background-bg-innerframe);
  border: 1px solid var(--background-divider);
  border-radius: var(--radius-default);
}
.segmented__option {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--padding-padding-4) var(--padding-padding-12);
  border-radius: var(--radius-sm);
  font-size: 0.8125rem;
  font-weight: 600;
  line-height: 1.4;
  color: var(--font-color-default-muted);
  background-color: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  font-family: inherit;
}
.segmented__option:hover {
  color: var(--font-color-default);
}
.segmented__option[aria-pressed="true"],
.segmented__option.is-active {
  color: var(--button-primary-text);
  background-color: var(--button-primary-background);
  border-color: var(--button-primary-border);
}

/* Table primitive 흉내 */
.data-table-wrap {
  background-color: var(--background-bg-default);
  border: 1px solid var(--background-divider);
  border-radius: var(--radius-default);
  overflow: hidden;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}
.data-table thead th {
  background-color: var(--background-bg-surface);
  color: var(--font-color-default);
  text-align: left;
  font-weight: 600;
  padding: var(--padding-padding-12) var(--padding-padding-16);
  border-bottom: 1px solid var(--background-divider);
  font-size: 0.8125rem;
  letter-spacing: -0.01em;
}
.data-table tbody td {
  padding: var(--padding-padding-12) var(--padding-padding-16);
  border-bottom: 1px solid var(--background-divider);
  color: var(--font-color-default);
  vertical-align: middle;
}
.data-table tbody tr:last-child td { border-bottom: none; }
/* data-display.md §2.1 실제 적용: hover 는 innerframe 톤 */
.data-table tbody tr:hover td { background-color: var(--background-bg-innerframe); }
.data-table td.align-right { text-align: right; }
.data-table td.align-center { text-align: center; }
.data-table th.col-check, .data-table td.col-check { width: 3rem; }

/* Checkbox primitive 흉내 (행 내 토글) */
.checkbox {
  appearance: none;
  -webkit-appearance: none;
  width: 1.125rem;
  height: 1.125rem;
  border: 1.5px solid var(--background-bg-surface-muted);
  border-radius: var(--radius-xs);
  background-color: var(--background-bg-default);
  cursor: pointer;
  display: inline-grid;
  place-content: center;
  margin: 0;
  vertical-align: middle;
  transition: background-color 0.12s ease, border-color 0.12s ease;
}
.checkbox:hover { border-color: var(--button-primary-border); }
.checkbox:checked {
  background-color: var(--button-primary-background);
  border-color: var(--button-primary-border);
}
.checkbox:checked::after {
  content: '';
  width: 0.4rem;
  height: 0.7rem;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: translateY(-1px) rotate(45deg);
}

/* completed=true 행 시각 구분 (text-muted + 취소선) */
.todo-row.is-completed .todo-title {
  color: var(--font-color-default-muted);
  text-decoration: line-through;
  text-decoration-thickness: 1.5px;
  text-decoration-color: var(--font-color-default-muted);
}
.todo-row.is-completed .todo-due {
  color: var(--font-color-default-muted);
}

/* 마감일 셀 — 기본은 muted, overdue 는 font-color-red */
.todo-due {
  color: var(--font-color-default-muted);
  font-size: 0.8125rem;
  font-variant-numeric: tabular-nums;
}
.todo-due.is-overdue {
  color: var(--font-color-red);
  font-weight: 600;
}
.todo-due--none {
  color: var(--font-color-default-muted);
  font-style: italic;
}

/* Badge primitive 흉내 (상태 배지) */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--padding-padding-4);
  padding: 2px var(--padding-padding-8);
  border-radius: var(--radius-pill);
  font-size: 0.6875rem;
  font-weight: 700;
  line-height: 1.4;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.badge--pending {
  background-color: var(--chips-status-pending-bg);
  color: var(--chips-status-pending-text);
}
.badge--done {
  background-color: var(--chips-status-done-bg);
  color: var(--chips-status-done-text);
}
.badge--overdue {
  background-color: var(--chips-status-overdue-bg);
  color: var(--chips-status-overdue-text);
}

.action-group {
  display: inline-flex;
  gap: var(--padding-padding-4);
  justify-content: flex-end;
}

.page-footnote {
  color: var(--font-color-default-muted);
  font-size: 0.8125rem;
  margin: 0;
}
</style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Light/Dark 테마 전환">🌓 Light ↔ Dark</button>
  <div class="page-container">

    <!-- 페이지 헤더: 제목 + Primary CTA. Loading/Error/Empty 에서도 유지 (global-states.md §2) -->
    <header class="page-header" role="banner">
      <h1 class="page-title">할 일</h1>
      <a class="btn btn-primary" href="#" aria-label="새 할 일 추가">+ 새 할 일</a>
    </header>

    <!--
      상태 필터: RadioGroup (segmented variant) 흉내.
      Brief: "세그먼트 컨트롤 / 라디오 그룹 언더라인" 권장, 드롭다운 금지.
      클릭 시 /todos?status=all|active|completed 재쿼리 (클라이언트 필터 금지).
      현재 선택 = Primary anchor.
    -->
    <div role="radiogroup" aria-label="상태 필터" class="segmented">
      <button type="button" class="segmented__option is-active" aria-pressed="true">전체</button>
      <button type="button" class="segmented__option" aria-pressed="false">진행 중</button>
      <button type="button" class="segmented__option" aria-pressed="false">완료</button>
    </div>

    <!--
      본문: Table primitive (정형 스키마 + 체크박스 컬럼 + 액션 컬럼).
      컬럼: 체크 / 제목 / 마감일 / 상태 배지 / 액션 (5개).
      상태 전환 (구현 단계):
        - Loading: tbody 자리 ListSkeleton. 헤더·필터·페이지 헤더 유지.
        - Error  : tbody 자리 에러 안내 + "다시 시도" Button.
        - Empty  : Table.emptyMessage="표시할 할 일이 없습니다." (필터별 문구는 재량).
    -->
    <div class="data-table-wrap" role="region" aria-label="할 일 목록">
      <table class="data-table">
        <thead>
          <tr>
            <th class="col-check align-center" scope="col" aria-label="완료 여부"></th>
            <th scope="col" style="width: 44%;">제목</th>
            <th scope="col" style="width: 18%;">마감일</th>
            <th scope="col" style="width: 14%;">상태</th>
            <th scope="col" class="align-right" style="width: 18%;">액션</th>
          </tr>
        </thead>
        <tbody>

          <!-- 진행 중 · 기한 없음 -->
          <tr class="todo-row">
            <td class="col-check align-center">
              <input type="checkbox" class="checkbox" aria-label="'디자인 시안 리뷰 노트 정리' 완료 토글" />
            </td>
